# Project-wide Gradle settings.
# IDE-managed Gradle settings may override values defined here.

# JVM settings for the Gradle daemon.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Use AndroidX dependencies.
android.useAndroidX=true

# Follow the official Kotlin code style.
kotlin.code.style=official

# Generate library R classes only from resources declared by each library.
android.nonTransitiveRClass=true
