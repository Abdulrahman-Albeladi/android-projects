name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validation:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install portable validator
        run: python -m pip install --upgrade nbformat PyYAML

      - name: Structural and security validation
        run: python tools/portfolio_validate.py
